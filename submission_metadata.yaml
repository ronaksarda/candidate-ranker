ai_usage_summary: |
  Used Gemini via Antigravity IDE for architecture discussion, code scaffolding,
  and debugging. No candidate data was fed to any LLM during ranking.
  The ranking pipeline runs fully offline using a local sentence-transformers model.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Semantic embedding ranker with behavioral signal fusion. Candidates are
  streamed from JSONL via generator, passed through a plausibility filter
  (4 mathematically impossible checks: extreme time-traveling tech, career overlap),
  and then ranked by a fast deterministic keyword scan over all 100,000 profiles.
  The top 3,500 candidates are shortlisted. We extract the most evidence-rich
  sentence from their career history alongside their top 5 skills. This dense
  text profile is batch-encoded using all-MiniLM-L6-v2 (loaded offline via
  direct Transformers inference) against three JD facets written in candidate-voice
  (core ML, search infra, nice-to-haves) to maximize cosine similarity alignment.
  Final scoring combines semantic similarity (50%), explicit JD skill match (30%),
  and behavioral signals (20%). It applies multiplicative gates: title matching,
  5-9 year experience band, graduated services-firm penalty, tenure stability,
  soft availability gates for ghost candidates, and explicitly penalizes LangChain-only
  or pure CV profiles. A multiplicative depth bonus (1.10x) is applied at the end
  to lift borderline candidates who demonstrate deep production evidence. Top 100
  candidates receive evidence-grounded reasoning dynamically tailored to their rank
  tier. Measured runtime on CPU: ~90 seconds, zero network calls.

