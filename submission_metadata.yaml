# ============================================================================
ai_tools_used:
  - "Gemini (Antigravity IDE)"

ai_usage_summary: |
  Used Gemini via Antigravity IDE for architecture discussion, code scaffolding,
  and debugging. No candidate data was fed to any LLM during ranking.
  The ranking pipeline runs fully offline using a local sentence-transformers model.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Semantic embedding ranker with behavioral signal fusion. Candidates are
  streamed from JSONL via generator, passed through a 5-check honeypot
  plausibility filter, then a fast heuristic keyword pre-filter eliminates
  ~90% of non-technical profiles before the expensive AI step. Remaining
  candidates are batch-encoded using all-MiniLM-L6-v2 (loaded offline),
  compared against 3 weighted JD facets (core ML 45%, infra 45%,
  nice-to-haves 10%) via normalized dot product. The final score fuses 
  50% semantic AI, 30% explicit JD skill match (to filter non-tech roles),
  and 20% behavioral signal score (activity recency, response rate,
  interview completion, notice period, location, GitHub activity).
  Dead profiles (180+ days inactive or <10% response) are halved.
  Top 100 candidates receive dynamically generated reasoning grounded
  in their actual top skills and specific signal gaps.
  Runtime: <5 minutes on CPU, 16GB RAM, zero network calls.

